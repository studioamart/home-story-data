name: Update home task data

# Refreshes the OTA manifests whenever the datasets change, and on a quarterly
# cadence. Two channels: maintenance schedules (data/home-tasks.json) and fix
# guides (data/lessons/*.json -> data/lessons.json). Data regeneration itself
# (expanding coverage) is done out-of-band — see the "regenerate" step note —
# but the manifest versions + checksums are always kept correct and committed
# here so the app picks up changes without an App Store release.

on:
  workflow_dispatch: {}            # manual trigger
  push:
    paths:
      - 'data/home-tasks.json'        # schedule data
      - 'data/lessons/**'             # fix-guide source files
  schedule:
    - cron: '0 9 1 */3 *'           # 09:00 UTC on the 1st, every 3rd month

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Plug your data-regeneration step in here when ready (e.g. a script or
      # Claude skill that expands data/home-tasks.json). It is intentionally a
      # no-op for now; the manifest rebuild below handles whatever data exists.
      - name: Regenerate dataset (optional)
        run: echo "No automated regeneration configured yet — data updated manually."

      - name: Rebuild manifests
        run: node scripts/build-manifest.mjs

      - name: Commit manifests if changed
        run: |
          FILES="data/manifest.json data/lessons.json data/lessons-manifest.json"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore: refresh data manifests [skip ci]"
            git push
          else
            echo "Manifests unchanged."
          fi
